plugins {
    id 'java-library'
    id 'maven-publish'
    id 'net.neoforged.gradle.userdev' version '7.1.21'
}

tasks.named('wrapper', Wrapper).configure {
    // Define wrapper values here so as to not have to always do so when updating gradlew.properties.
    // Switching this to Wrapper.DistributionType.ALL will download the full gradle sources that comes with
    // documentation attached on cursor hover of gradle classes and methods. However, this comes with increased
    // file size for Gradle. If you do switch this to ALL, run the Gradle wrapper task twice afterwards.
    // (Verify by checking gradle/wrapper/gradle-wrapper.properties to see if distributionUrl now points to `-all`)
    distributionType = Wrapper.DistributionType.BIN
}

version = mod_version
group = mod_group_id

sourceSets.main.resources {
    // Include resources generated by data generators.
    srcDir('src/generated/resources')

    // Exclude common development only resources from finalized outputs
    exclude("**/*.bbmodel") // BlockBench project files
    exclude("src/generated/**/.cache") // datagen cache files
}

repositories {
    mavenCentral()
}

base {
    archivesName = mod_id
}

// Mojang ships Java 21 to end users in 1.21.1, so mods should target Java 21.
java.toolchain.languageVersion = JavaLanguageVersion.of(21)

//minecraft.accessTransformers.file rootProject.file('src/main/resources/META-INF/accesstransformer.cfg')
//minecraft.accessTransformers.entry public net.minecraft.client.Minecraft textureManager # textureManager

// Default run configurations.
// These can be tweaked, removed, or duplicated as needed.
runs {
    // applies to all the run configs below
    configureEach {
        // Recommended logging data for a userdev environment
        // The markers can be added/remove as needed separated by commas.
        // "SCAN": For mods scan.
        // "REGISTRIES": For firing of registry events.
        // "REGISTRYDUMP": For getting the contents of all registries.
        systemProperty 'forge.logging.markers', 'REGISTRIES'

        // Recommended logging level for the console
        // You can set various levels here.
        // Please read: https://stackoverflow.com/questions/2031163/when-to-use-the-different-log-levels
        systemProperty 'forge.logging.console.level', 'debug'

        modSource project.sourceSets.main
    }

    client {
        // Comma-separated list of namespaces to load gametests from. Empty = all namespaces.
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    server {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
        argument '--nogui'
    }

    // This run config launches GameTestServer and runs all registered gametests, then exits.
    // By default, the server will crash when no gametests are provided.
    // The gametest system is also enabled by default for other run configs under the /test command.
    gameTestServer {
        systemProperty 'neoforge.enabledGameTestNamespaces', project.mod_id
    }

    data {
        // example of overriding the workingDirectory set in configureEach above, uncomment if you want to use it
        // workingDirectory project.file('run-data')

        // Specify the modid for data generation, where to output the resulting resource, and where to look for existing resources.
        arguments.addAll '--mod', project.mod_id, '--all', '--output', file('src/generated/resources/').getAbsolutePath(), '--existing', file('src/main/resources/').getAbsolutePath()
    }
}

// Sets up a dependency configuration called 'localRuntime'.
// This configuration should be used instead of 'runtimeOnly' to declare
// a dependency that will be present for runtime testing but that is
// "optional", meaning it will not be pulled by dependents of this mod.
configurations {
    runtimeClasspath.extendsFrom localRuntime
}

dependencies {
    implementation "net.neoforged:neoforge:${neo_version}"

    testImplementation 'org.junit.jupiter:junit-jupiter:5.10.2'
    testImplementation 'org.mockito:mockito-core:5.11.0'
    testImplementation 'org.mockito:mockito-junit-jupiter:5.11.0'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher'
}

test {
    useJUnitPlatform()
}

// Workaround NeoGradle 7.1.21 : neoFormRecompile échoue silencieusement pour certaines
// classes Minecraft (Entity, IEntityExtension). On ajoute les deux jars manquants au classpath.
afterEvaluate {
    def renameJar = tasks.named('neoFormRename').get().outputs.files.find { it.name == 'outputs.jar' }
    def universalJar = file("${gradle.gradleUserHomeDir}/caches/modules-2/files-2.1/net.neoforged/neoforge/${neo_version}").listFiles()
        ?.collectMany { it.listFiles()?.toList() ?: [] }
        ?.find { it.name == "neoforge-${neo_version}-universal.jar" }
    if (renameJar) compileJava.classpath += files(renameJar)
    if (universalJar) compileJava.classpath += files(universalJar)
}

// Workaround NeoGradle 7.1.21 : StreamCodec absent du raw.jar généré par supplyRawJar.
// On patche le jar après génération en injectant les classes depuis le jar recompilé intermédiaire.
afterEvaluate {
    def supplyTask = tasks.findByName("supplyRawJarForneoFormJoined1.21.1-20240808.144430")
    if (supplyTask != null) {
        // Capture au moment de la configuration (pas dans doLast)
        def rawJarPath = layout.projectDirectory.dir(".gradle/configuration/neoForm/neoFormJoined1.21.1-20240808.144430").file("raw.jar").asFile.absolutePath
        def gradleHome = gradle.gradleUserHomeDir.absolutePath
        supplyTask.doLast {
            def rawJar = new File(rawJarPath)
            if (!rawJar.exists()) return

            // Utiliser sourcesAndCompiledWithNeoForge comme source principale (classes patchées NF)
            // et recompile_ comme source secondaire (classes MC manquantes du NeoForge jar)
            def intermediateDir = new File(gradleHome, "caches/neoformruntime/intermediate_results")

            // Source prioritaire : sourcesAndCompiledWithNeoForge (contient les classes NeoForge-patchées)
            def nfJar = intermediateDir.listFiles()?.findAll { f ->
                f.name.startsWith("sourcesAndCompiledWithNeoForge_") && f.name.endsWith("_output.jar")
            }?.sort { -it.lastModified() }?.find { f ->
                try { new java.util.zip.ZipFile(f).close(); true } catch (ex) { false }
            }

            // Source secondaire : recompile_ (classes MC manquantes)
            def mcJar = intermediateDir.listFiles()?.findAll { f ->
                f.name.startsWith("recompile_") && f.name.endsWith("_output.jar")
            }?.sort { -it.lastModified() }?.find { f ->
                try {
                    def zf = new java.util.zip.ZipFile(f)
                    def has = zf.getEntry("net/minecraft/network/codec/StreamCodec.class") != null
                    zf.close(); has
                } catch (ex) { false }
            }

            if (nfJar == null && mcJar == null) { logger.warn("patchRawJar: aucun jar source trouvé"); return }
            logger.lifecycle("patchRawJar: NF=${nfJar?.name}, MC=${mcJar?.name}")

            // Construire la map de classes à ajouter/remplacer depuis les sources
            // Priorité : NF jar > MC jar
            def srcMap = [:]  // name -> srcFile
            [mcJar, nfJar].each { srcFile ->
                if (srcFile == null) return
                try {
                    def zf = new java.util.zip.ZipFile(srcFile)
                    zf.entries().each { e ->
                        if (e.name.endsWith(".class")) srcMap[e.name] = srcFile
                    }
                    zf.close()
                } catch (ex) { /* skip */ }
            }

            // Ce qu'on a déjà dans raw.jar
            def dstMap = [:]
            def dstZip = new java.util.zip.ZipFile(rawJar)
            dstZip.entries().each { dstMap[it.name] = true }
            dstZip.close()

            // Classes à ajouter (manquantes) + classes NF-patchées à remplacer
            // On remplace toute classe qui existe dans srcMap (pour garantir version NF-patchée)
            def toAdd = srcMap.entrySet().collect { [it.value, it.key] }

            if (toAdd.empty) { logger.lifecycle("patchRawJar: déjà patché, rien à faire"); return }

            def tmpJar = new File(rawJar.parent, "raw_patched.jar")
            def tmpOut = new java.util.zip.ZipOutputStream(new java.io.FileOutputStream(tmpJar))

            // Copier l'existant en excluant les .class qui seront remplacés
            def existingZip = new java.util.zip.ZipFile(rawJar)
            existingZip.entries().each { e ->
                if (e.name.endsWith(".class") && srcMap.containsKey(e.name)) return  // sera remplacé
                tmpOut.putNextEntry(new java.util.zip.ZipEntry(e.name))
                if (!e.directory) tmpOut.write(existingZip.getInputStream(e).bytes)
                tmpOut.closeEntry()
            }
            existingZip.close()

            // Ajouter/remplacer toutes les classes depuis srcMap (NF-patchées)
            def replaced = 0; def added = 0
            toAdd.each { pair ->
                def (srcFile, entryName) = pair
                try {
                    def sz = new java.util.zip.ZipFile(srcFile)
                    def ze = sz.getEntry(entryName)
                    if (ze != null) {
                        tmpOut.putNextEntry(new java.util.zip.ZipEntry(entryName))
                        tmpOut.write(sz.getInputStream(ze).bytes)
                        tmpOut.closeEntry()
                        if (dstMap.containsKey(entryName)) replaced++ else added++
                    }
                    sz.close()
                } catch (ex) { /* skip */ }
            }
            tmpOut.close()

            rawJar.delete()
            tmpJar.renameTo(rawJar)
            logger.lifecycle("patchRawJar: ${replaced} classes remplacées (NF-patch), ${added} ajoutées")
        }
    }
}

// This block of code expands all declared replace properties in the specified resource targets.
// A missing property will result in an error. Properties are expanded using ${} Groovy notation.
// When "copyIdeResources" is enabled, this will also run before the game launches in IDE environments.
// See https://docs.gradle.org/current/dsl/org.gradle.language.jvm.tasks.ProcessResources.html
tasks.withType(ProcessResources).configureEach {
    var replaceProperties = [
            minecraft_version      : minecraft_version,
            minecraft_version_range: minecraft_version_range,
            neo_version            : neo_version,
            loader_version_range   : loader_version_range,
            mod_id                 : mod_id,
            mod_name               : mod_name,
            mod_license            : mod_license,
            mod_version            : mod_version,
    ]
    inputs.properties replaceProperties

    filesMatching(['META-INF/neoforge.mods.toml']) {
        expand replaceProperties
    }
}

// Example configuration to allow publishing using the maven-publish plugin
publishing {
    publications {
        register('mavenJava', MavenPublication) {
            from components.java
        }
    }
    repositories {
        maven {
            url "file://${project.projectDir}/repo"
        }
    }
}

tasks.withType(JavaCompile).configureEach {
    options.encoding = 'UTF-8' // Use the UTF-8 charset for Java compilation
}

// IDEA no longer automatically downloads sources/javadoc jars for dependencies, so we need to explicitly enable the behavior.
idea {
    module {
        downloadSources = true
        downloadJavadoc = true
    }
}
